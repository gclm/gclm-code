<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.1, maximum-scale=5.0, user-scalable=yes">
    <title>gclm-code-server - Terminal</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/xterm.css">
</head>
<body class="terminal-page">
    <div class="term-chrome">
        <div class="term-titlebar">
            <a id="back-link" href="/" class="term-back" title="Back to dashboard">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M7.78 12.53a.75.75 0 01-1.06 0L2.47 8.28a.75.75 0 010-1.06l4.25-4.25a.75.75 0 011.06 1.06L4.81 7h7.44a.75.75 0 010 1.5H4.81l2.97 2.97a.75.75 0 010 1.06z"/>
                </svg>
            </a>
            <div class="term-dots">
                <span class="dot dot-red"></span>
                <span class="dot dot-yellow"></span>
                <span class="dot dot-green"></span>
            </div>
            <div class="term-title-center">
                <span id="session-name" class="term-session-name">...</span>
            </div>
            <span id="session-status" class="status-badge online">
                <span class="status-dot"></span>
                <span id="status-text">Connected</span>
            </span>
        </div>
        <div class="terminal-wrapper">
            <div id="terminal" class="terminal-container"></div>
            <div id="disconnect-overlay" class="disconnect-overlay" style="display:none;">
                <div class="disconnect-content">
                    <div class="disconnect-icon">&#9888;</div>
                    <p>Connection lost</p>
                    <p class="disconnect-hint">Reconnecting...</p>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/vendor/xterm.min.js"></script>
    <script src="/js/vendor/xterm-addon-fit.min.js"></script>
    <script src="/js/terminal.js"></script>
</body>
</html>
