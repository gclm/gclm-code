name: CI Verify

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Brand guard
        run: bun run brand:guard

      - name: Build
        run: bun run build

      - name: Run unit and integration tests
        run: bun run test

      - name: Run smoke test
        run: bun run smoke

      - name: Pack npm
        run: node scripts/pack-npm.mjs

      - name: Smoke npm package
        run: node scripts/smoke-npm-package.mjs
