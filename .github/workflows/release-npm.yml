name: Release NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.1). Leave empty to use v<package.json version>'
        required: false
        type: string
      publish_to_npm:
        description: 'Publish package to npm'
        required: true
        default: false
        type: boolean
      npm_tag:
        description: 'npm dist-tag used when publish_to_npm=true'
        required: true
        default: 'latest'
        type: string

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    runs-on: macos-15-intel
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      publish_npm: ${{ steps.meta.outputs.publish_npm }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
            NPM_TAG="latest"
            PUBLISH_NPM="true"
            if [ "$TAG" != "v${VERSION}" ]; then
              echo "Tag ${TAG} does not match package.json version v${VERSION}" >&2
              exit 1
            fi
          else
            TAG_INPUT="${{ inputs.release_tag }}"
            if [ -n "$TAG_INPUT" ]; then
              TAG="$TAG_INPUT"
            else
              TAG="v${VERSION}"
            fi
            NPM_TAG="${{ inputs.npm_tag }}"
            PUBLISH_NPM="${{ inputs.publish_to_npm }}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "npm_tag=${NPM_TAG}" >> "$GITHUB_OUTPUT"
          echo "publish_npm=${PUBLISH_NPM}" >> "$GITHUB_OUTPUT"

  build-and-test:
    runs-on: macos-latest
    needs: meta
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Run smoke
        run: bun run smoke

      - name: Pack npm
        run: node scripts/pack-npm.mjs

      - name: Smoke npm package
        run: node scripts/smoke-npm-package.mjs

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-npm:
    runs-on: macos-15-intel
    needs: [meta, build-and-test]
    if: ${{ needs.meta.outputs.publish_npm == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (npm)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and pack
        run: |
          bun install --frozen-lockfile
          bun run build
          node scripts/pack-npm.mjs

      - name: Publish
        run: npm publish dist/npm-package/ --access public --tag ${{ needs.meta.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          AUTHORIZED: '1'

  tag-stable:
    runs-on: macos-15-intel
    needs: [meta, publish-npm]
    if: ${{ needs.meta.outputs.publish_npm == 'true' && needs.meta.outputs.npm_tag == 'latest' }}
    steps:
      - name: Setup Node (npm)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Tag current version as stable
        run: npm dist-tag add gclm-code@${{ needs.meta.outputs.version }} stable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
